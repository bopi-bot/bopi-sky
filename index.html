<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>sky sim</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { cream: '#FFFBF0', bolt: '#005EEA' },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        },
      },
    }
  </script>
  <style>
    body { -webkit-font-smoothing: antialiased; }
    ::selection { background: rgba(0,94,234,0.15); }
    canvas { display: block; width: 100%; border-radius: 0.25rem; image-rendering: auto; }
    input[type=range] { -webkit-appearance: none; appearance: none; height: 2px; background: rgba(0,0,0,0.08); border-radius: 1px; outline: none; cursor: pointer; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #005EEA; cursor: pointer; }
    input[type=range]::-moz-range-thumb { width: 12px; height: 12px; border-radius: 50%; background: #005EEA; cursor: pointer; border: none; }
    input[type=date] { background: rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.06); border-radius: 0.25rem; padding: 0.25rem 0.5rem; color: rgba(0,0,0,0.5); font-family: 'Inter', system-ui, sans-serif; font-size: 0.8125rem; text-transform: lowercase; outline: none; cursor: pointer; }
    input[type=date]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.4; }
  </style>
</head>
<body class="bg-cream text-gray-900 font-sans">

  <div class="max-w-2xl mx-auto px-6 pt-8 pb-6">
    <p class="text-sm text-black/40 lowercase tracking-tight">atmospheric sky simulation</p>
    <h1 class="text-xl font-normal lowercase tracking-tight leading-snug mt-1">sky sim</h1>
    <p class="text-sm text-black/50 lowercase leading-relaxed mt-2">preetham sky model with rayleigh and mie scattering. pure analytic daylight.</p>
  </div>

  <main class="max-w-2xl mx-auto px-6 pb-6">
    <!-- canvases -->
    <div class="flex flex-col gap-2">
      <div class="relative">
        <canvas id="cPan"></canvas>
        <div class="absolute bottom-2 left-2 bg-black/20 backdrop-blur-md rounded px-2 py-1">
          <span class="text-[0.625rem] text-white/50 lowercase">equirectangular</span>
        </div>
      </div>
      <div class="relative">
        <canvas id="cHem"></canvas>
        <div class="absolute bottom-2 left-2 bg-black/20 backdrop-blur-md rounded px-2 py-1">
          <span class="text-[0.625rem] text-white/50 lowercase">hemisphere</span>
        </div>
      </div>
    </div>

    <!-- hud -->
    <div class="flex justify-between items-center mt-2">
      <div class="flex gap-3 items-center">
        <span class="text-[0.6875rem] text-black/40 lowercase">sun <span class="text-black/60 font-medium" id="he">45</span> deg</span>
        <span class="text-[0.6875rem] text-black/60 font-medium" id="ht">12:00</span>
      </div>
      <button id="pb" class="bg-black/5 hover:bg-black/8 rounded px-3 py-1 text-[0.6875rem] text-black/40 lowercase cursor-pointer hover:text-black/60 transition-colors font-sans">play</button>
    </div>

    <!-- controls -->
    <div class="mt-4 flex flex-col gap-3">
      <div class="flex items-center gap-3">
        <label class="text-xs text-black/40 lowercase min-w-[3.5rem]">date</label>
        <input type="date" id="cd" value="2026-06-21" class="flex-1">
      </div>
      <div class="flex items-center gap-3">
        <label class="text-xs text-black/40 lowercase min-w-[3.5rem]">time</label>
        <input type="range" id="ct" min="0" max="24" step="0.02" value="12" class="flex-1">
        <span class="text-xs text-black/40 min-w-[3rem] text-right font-mono" id="vt">12:00</span>
      </div>
      <div class="flex items-center gap-3">
        <label class="text-xs text-black/40 lowercase min-w-[3.5rem]">latitude</label>
        <input type="range" id="cl" min="-90" max="90" step="0.5" value="21" class="flex-1">
        <span class="text-xs text-black/40 min-w-[3rem] text-right font-mono" id="vl">21.0</span>
      </div>
      <div class="flex items-center gap-3">
        <label class="text-xs text-black/40 lowercase min-w-[3.5rem]">turbidity</label>
        <input type="range" id="cb" min="1" max="10" step="0.1" value="3" class="flex-1">
        <span class="text-xs text-black/40 min-w-[3rem] text-right font-mono" id="vb">3.0</span>
      </div>
      <div class="flex items-center gap-3">
        <label class="text-xs text-black/40 lowercase min-w-[3.5rem]">exposure</label>
        <input type="range" id="ce" min="0.1" max="3" step="0.05" value="1.0" class="flex-1">
        <span class="text-xs text-black/40 min-w-[3rem] text-right font-mono" id="ve">1.00</span>
      </div>
    </div>

    <p class="text-xs text-black/30 lowercase mt-4 leading-relaxed">based on the preetham 1999 analytic daylight model. scratchapixel tutorial for rayleigh/mie scattering fundamentals.</p>
  </main>

<script>
"use strict";
const CP=document.getElementById("cPan"),CH=document.getElementById("cHem");
const XP=CP.getContext("2d"),XH=CH.getContext("2d");
const PI=Math.PI,TAU=PI*2,DG=PI/180,RD=180/PI;
const clp=(x,a,b)=>x<a?a:x>b?b:x;
const sm=(a,b,x)=>{const t=clp((x-a)/(b-a),0,1);return t*t*(3-2*t)};

function resize(){
  const w=CP.parentElement.clientWidth||innerWidth;
  // equirectangular: 2:1 aspect
  const pH=Math.round(w*.5);
  PW=CP.width=Math.round(w*.5);
  PH=CP.height=Math.round(pH*.5);
  CP.style.height=pH+'px';
  // hemisphere: square canvas, full width
  const hW=Math.round(w*.5);
  HW=CH.width=hW;
  HH=CH.height=hW;
  CH.style.height=hW+'px';
  needRender=true;
}
addEventListener("resize",resize);

// --- params ---
const P={time:12,lat:21,lon:105.85,tz:7,turb:3,exp:1,date:new Date(2026,5,21)};
let playing=false,needRender=false,PW=1,PH=1,HW=1,HH=1;

// --- solar position (full astronomical model) ---
function dayOfYear(d){const s=new Date(d.getFullYear(),0,0);return Math.floor((d-s)/86400000)}

function solarPosition(hours,lat,lon,tz,date){
  const latR=lat*DG,lonR=lon*DG,tzM=tz*15*DG;
  const jul=dayOfYear(date);
  const solarTime=hours
    +0.170*Math.sin(4*PI*(jul-80)/373)
    -0.129*Math.sin(2*PI*(jul-8)/355)
    +12*(tzM-lonR)/PI;
  const dec=0.4093*Math.sin(2*PI*(jul-81)/368);
  const sinL=Math.sin(latR),cosL=Math.cos(latR);
  const sinD=Math.sin(dec),cosD=Math.cos(dec);
  const cosHT=Math.cos(PI*solarTime/12);
  const sinHT=Math.sin(PI*solarTime/12);
  const sunZenith=PI/2-Math.asin(clp(sinL*sinD-cosL*cosD*cosHT,-1,1));
  const sunAzimuth=Math.atan2(-cosD*sinHT,cosL*sinD-sinL*cosD*cosHT);
  return{zenith:sunZenith,azimuth:sunAzimuth,alt:PI/2-sunZenith};
}

// --- Preetham sky model (1999) ---
function calcZenitalAbsolutes(turb,sz){
  const tanArg=clp((4/9-turb/120)*(PI-2*sz),-1.4,1.4);
  const Yz=(4.0453*turb-4.9710)*Math.tan(tanArg)-0.2155*turb+2.4192;
  const Y0=40;
  const z3=sz*sz*sz,z2=sz*sz,z=sz;
  const T2=turb*turb;
  const xz=T2*(0.00166*z3-0.00375*z2+0.00209*z)
        +turb*(-0.02903*z3+0.06377*z2-0.03202*z+0.00394)
        +(0.11693*z3-0.21196*z2+0.06052*z+0.25886);
  const yz=T2*(0.00275*z3-0.00610*z2+0.00317*z)
        +turb*(-0.04214*z3+0.08970*z2-0.04153*z+0.00516)
        +(0.15346*z3-0.26756*z2+0.06670*z+0.26688);
  return{Yz:clp(Yz/Y0,0,1e6),xz:clp(xz,0,1),yz:clp(yz,0,1)};
}

function calcCoeffs(turb){
  return{
    Y:{A:0.1787*turb-1.4630, B:-0.3554*turb+0.4275, C:-0.0227*turb+5.3251, D:0.1206*turb-2.5771, E:-0.0670*turb+0.3703},
    x:{A:-0.0193*turb-0.2592, B:-0.0665*turb+0.0008, C:-0.0004*turb+0.2125, D:-0.0641*turb-0.8989, E:-0.0033*turb+0.0452},
    y:{A:-0.0167*turb-0.2608, B:-0.0950*turb+0.0092, C:-0.0079*turb+0.2102, D:-0.0441*turb-1.6537, E:-0.0109*turb+0.0529}
  };
}

function perez(zenith,gamma,c){
  const cosZ=Math.max(Math.cos(clp(zenith,0,PI*.499)),0.001);
  const term1=1+c.A*Math.exp(c.B/cosZ);
  const term2=1+c.C*Math.exp(c.D*gamma)+c.E*Math.cos(gamma)*Math.cos(gamma);
  return Math.max(term1*term2,0);
}

function yxyToRgb(Y,x,y){
  if(y<=0)return{r:0,g:0,b:0};
  const X=x/y*Y, Z=(1-x-y)/y*Y;
  const gc=v=>Math.max(0,Math.min(1,Math.pow(clp(v,0,1e6),1/1.8)));
  return{
    r:gc( 3.2406*X-1.5372*Y-0.4986*Z),
    g:gc(-0.9689*X+1.8758*Y+0.0415*Z),
    b:gc( 0.0557*X-0.2040*Y+1.0570*Z)
  };
}

function skyColor(vz,va,zenAbs,coeffs,sunZen,sunAz){
  const cosG=Math.sin(vz)*Math.sin(sunZen)*Math.cos(va-sunAz)+Math.cos(vz)*Math.cos(sunZen);
  const gamma=Math.acos(clp(cosG,-1,1));
  const pYzen=perez(0,sunZen,coeffs.Y);
  const pXzen=perez(0,sunZen,coeffs.x);
  const pYZen=perez(0,sunZen,coeffs.y);
  const Yp=pYzen>0?zenAbs.Yz*perez(vz,gamma,coeffs.Y)/pYzen:0;
  const xp=pXzen>0?zenAbs.xz*perez(vz,gamma,coeffs.x)/pXzen:0;
  const yp=pYZen>0?zenAbs.yz*perez(vz,gamma,coeffs.y)/pYZen:0;
  return yxyToRgb(clp(Yp,0,1e6),clp(xp,0,1),clp(yp,0,1));
}

function aces(x){const a=2.51,b=.03,c=2.43,d=.59,e=.14;return clp((x*(a*x+b))/(x*(c*x+d)+e),0,1)}

// pixel shader shared by both projections
function pixel(vz,va,sz,saz,sunAlt,turb,exp,zenAbs,coeffs){
  const cosG=Math.sin(vz)*Math.sin(sz)*Math.cos(va-saz)+Math.cos(vz)*Math.cos(sz);
  const gamma=Math.acos(clp(cosG,-1,1));
  const sc=skyColor(vz,va,zenAbs,coeffs,sz,saz);
  const sunI=Math.max(Math.cos(sz),0);
  const scI=.25+sunI*.75;
  let r=sc.r*scI,g=sc.g*scI,b=sc.b*scI;
  if(sunAlt>-.2){
    const sR=.00465*RD;
    const gl=Math.exp(-gamma*gamma/(.013*.013))*.3;
    const dk=sm(sR*2.5,sR*1,gamma);
    const sG=sm(-.1,.18,sunAlt),sB=sm(.02,.32,sunAlt);
    const fade=sm(-.2,.05,sunAlt);
    const si=(dk*40+gl*18)*fade;
    r+=si;g+=sG*si;b+=sB*si;
  }
  const tr=aces(r*exp),tg=aces(g*exp),tb=aces(b*exp);
  return[Math.pow(tr,1/2.2)*255|0,Math.pow(tg,1/2.2)*255|0,Math.pow(tb,1/2.2)*255|0];
}

// --- render ---
function render(){
  const sun=solarPosition(P.time,P.lat,P.lon,P.tz,P.date);
  const sz=sun.zenith,saz=sun.azimuth,sunAlt=sun.alt;
  const turb=P.turb,exp=P.exp;
  const zenAbs=calcZenitalAbsolutes(turb,sz);
  const coeffs=calcCoeffs(turb);

  // --- equirectangular ---
  const imgP=XP.createImageData(PW,PH);
  const dP=imgP.data;
  for(let y=0;y<PH;y++){
    const vz=(y/PH)*PI/2;
    for(let x=0;x<PW;x++){
      const i=(y*PW+x)<<2;
      const va=(x/PW-.5)*TAU;
      const c=pixel(vz,va,sz,saz,sunAlt,turb,exp,zenAbs,coeffs);
      dP[i]=c[0];dP[i+1]=c[1];dP[i+2]=c[2];dP[i+3]=255;
    }
  }
  XP.putImageData(imgP,0,0);

  // --- hemisphere ---
  const imgH=XH.createImageData(HW,HH);
  const dH=imgH.data;
  const cx=HW/2,cy=HH/2,rad=cx*.95;
  for(let y=0;y<HH;y++){
    for(let x=0;x<HW;x++){
      const i=(y*HW+x)<<2;
      const dx=(x-cx)/rad,dy=(y-cy)/rad;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist>1){
        // outside circle -- cream background
        dH[i]=255;dH[i+1]=251;dH[i+2]=240;dH[i+3]=255;
        continue;
      }
      // equidistant: r = dist * PI/2, so dist=0 is zenith, dist=1 is horizon
      const vz=dist*PI/2;
      const va=Math.atan2(dx,-dy); // north = top, east = right
      const c=pixel(vz,va,sz,saz,sunAlt,turb,exp,zenAbs,coeffs);
      dH[i]=c[0];dH[i+1]=c[1];dH[i+2]=c[2];dH[i+3]=255;
    }
  }
  XH.putImageData(imgH,0,0);
}

// --- UI ---
const $=id=>document.getElementById(id);
function fmt(h){const hh=Math.floor(h)%24,mm=Math.floor((h%1)*60);return String(hh).padStart(2,"0")+":"+String(mm).padStart(2,"0")}
function sync(){
  const ts=fmt(P.time);
  $("vt").textContent=ts;$("vl").textContent=P.lat.toFixed(1);
  $("vb").textContent=P.turb.toFixed(1);
  $("ve").textContent=P.exp.toFixed(2);
  $("ct").value=P.time;$("cl").value=P.lat;$("cb").value=P.turb;
  $("ce").value=P.exp;
  const s=solarPosition(P.time,P.lat,P.lon,P.tz,P.date);
  $("he").textContent=(s.alt*RD).toFixed(0);
  $("ht").textContent=ts;
}
$("ct").oninput=()=>{P.time=+$("ct").value;sync();needRender=true};
$("cl").oninput=()=>{P.lat=+$("cl").value;sync();needRender=true};
$("cb").oninput=()=>{P.turb=+$("cb").value;sync();needRender=true};
$("ce").oninput=()=>{P.exp=+$("ce").value;sync();needRender=true};
$("cd").oninput=()=>{P.date=new Date($("cd").value+"T00:00:00");sync();needRender=true};
$("pb").onclick=()=>{playing=!playing;$("pb").textContent=playing?"pause":"play"};

(function loop(){
  if(playing){P.time+=.004;if(P.time>=24)P.time-=24;sync();needRender=true}
  if(needRender||playing){render();needRender=false}
  requestAnimationFrame(loop);
})();

resize();sync();render();
setTimeout(()=>{resize();needRender=true},200);
</script>
</body>
</html>
